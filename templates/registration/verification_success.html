{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h3>Email verified</h3>
        <p>Thanks <strong>{{ user.username }}</strong> — your email is now verified and your account is active.</p>
        <a class="btn btn-primary" href="{% url 'core:login' %}">Log in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
