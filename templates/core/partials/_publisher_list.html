{% if publishers.exists %}
<table class="table table-striped">
  <thead>
    <tr>
      <th>Username</th>
      <th>Name</th>
      <th>Email</th>
      <th>Years</th>
      <th>Articles</th>
    </tr>
  </thead>
  <tbody>
    {% for p in publishers %}
    <tr>
      <td><a href="{% url 'core:publisher_detail' p.pk %}">{{ p.username }}</a></td>
      <td>{{ p.first_name }} {{ p.last_name }}</td>
      <td>{{ p.email }}</td>
      <td>{{ p.years_of_experience }}</td>
      <td><a href="{% url 'core:publisher_articles' p.pk %}">{{ p.newspapers.count }}</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="no-results">No publishers found.</p>
{% endif %}
